name: CT Amend Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  actions: write

concurrency:
  group: ct-amend-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Load Persisted LCO State
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import os
          import requests

          token = os.environ["GH_TOKEN"]
          repo = os.environ["GH_REPO"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          names = ("CT_HOUSE_LAST_LCO", "CT_SENATE_LAST_LCO")
          loaded = {}
          for name in names:
              url = f"https://api.github.com/repos/{repo}/actions/variables/{name}"
              r = requests.get(url, headers=headers, timeout=30)
              if r.status_code == 404:
                  continue
              r.raise_for_status()
              val = str(r.json().get("value", "")).strip()
              if val:
                  loaded[name] = val

          env_file = os.environ["GITHUB_ENV"]
          with open(env_file, "a", encoding="utf-8") as f:
              for k, v in loaded.items():
                  f.write(f"{k}={v}\n")

          print("Loaded state vars:", ", ".join(sorted(loaded)) if loaded else "none")
          PY

      - name: Run Watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CT_REQUIRE_TELEGRAM: "1"
        run: python watch_amend.py

      - name: Persist LCO State
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          import requests

          state_path = Path("state.json")
          if not state_path.exists():
              print("state.json missing; skipping state persistence")
              raise SystemExit(0)

          state = json.loads(state_path.read_text(encoding="utf-8"))
          updates = {
              "CT_HOUSE_LAST_LCO": str(state.get("house_last_lco") or "").strip(),
              "CT_SENATE_LAST_LCO": str(state.get("senate_last_lco") or "").strip(),
          }
          updates = {k: v for k, v in updates.items() if v}
          if not updates:
              print("No LCO values to persist")
              raise SystemExit(0)

          token = os.environ["GH_TOKEN"]
          repo = os.environ["GH_REPO"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          base_url = f"https://api.github.com/repos/{repo}/actions/variables"

          for name, value in updates.items():
              payload = {"name": name, "value": value}
              patch_url = f"{base_url}/{name}"
              r = requests.patch(patch_url, headers=headers, json=payload, timeout=30)
              if r.status_code == 404:
                  r = requests.post(base_url, headers=headers, json=payload, timeout=30)
              r.raise_for_status()
              print(f"Persisted {name}={value}")
          PY
